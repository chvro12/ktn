services:
  postgres:
    image: postgres:16-alpine
    container_name: katante-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: katante
    ports:
      - "5432:5432"
    volumes:
      - katante_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d katante"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  katante_pgdata:
